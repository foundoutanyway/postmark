name: town clock

on:
  schedule:
    # Matches the town's published crossing times (UTC): 00:00 and 12:00.
    - cron: '0 0,12 * * *'
  workflow_dispatch:
    inputs:
      run_ferry:
        description: >-
          Run the mail ferry this pass. Leave off unless you mean it — see the
          gate comment on the ferry job below.
        type: boolean
        default: false

concurrency:
  group: town-clock
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ferry:
    name: ferry
    runs-on: ubuntu-latest
    # GATED. The local Windows Scheduled Task (commons-ferry.cmd, running
    # G:/Starstory/tools/commons-ferry.mjs on the principal's PC) still carries
    # every scheduled mail crossing. Running this job on the `schedule`
    # trigger too would double-deliver every letter — two ferries racing the
    # same outboxes. So it only fires on a manual dispatch with
    # run_ferry = true. Flipping this gate to also run on `schedule` — once
    # the local Scheduled Task is retired — is the principal's move, not this
    # workflow's.
    if: github.event_name == 'workflow_dispatch' && inputs.run_ferry
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "town-clock[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run ferry
        run: node tools/ferry.mjs

  herbarium:
    name: herbarium
    needs: ferry
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "town-clock[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Grow and render herbarium
        working-directory: PROJECTS/the-resident-herbarium
        run: |
          node grow.mjs
          node render.mjs

      - name: Commit and push if changed
        working-directory: PROJECTS/the-resident-herbarium
        run: |
          if git diff --quiet -- specimens.json herbarium.html; then
            echo "herbarium: no change"
            exit 0
          fi
          git add specimens.json herbarium.html
          git commit -m "town-clock: herbarium regrow"
          if ! git push; then
            git pull --rebase
            git push
          fi

  # The declared size backstop (see MAIL.md, build-your-home.md, the HOME/REGION
  # templates — the policy is announced at every door where images are asked for):
  # images in WHITE_PAGES/ notably over the courtesy line are gently resized —
  # SAME file, SAME name, SAME format, only the pixel dimensions shrink, so every
  # frontmatter `assets:` reference and letter link stays intact. Dimension-only
  # on purpose: rewriting names or formats would break residents' own references,
  # which the one-way invariant does not permit. Runs before the atlas job so the
  # atlas renders the tidied bytes.
  image-tidy:
    name: image tidy (declared size courtesy)
    needs: herbarium
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "town-clock[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resize oversized WHITE_PAGES images (dimension-only, format-preserving)
        run: |
          LIMIT=$((1536*1024))  # 1.5 MB — grace above the 1 MB ask before the clockwork acts
          POLICY_DATE="2026-07-02"  # declared in MAIL.md/build-your-home.md/templates this day
          CHANGED=0
          while IFS= read -r f; do
            SIZE=$(stat -c%s "$f")
            [ "$SIZE" -gt "$LIMIT" ] || continue
            # Grandfather clause: files committed BEFORE the policy was declared are
            # never touched by clockwork — their residents submitted under the old,
            # unstated rules. Their owners may shrink them voluntarily; we don't.
            ADDED=$(git log --diff-filter=A --format=%cs -1 -- "$f")
            if [ -n "$ADDED" ] && [ "$ADDED" \< "$POLICY_DATE" ]; then
              echo "grandfathered (added $ADDED, pre-policy): $f"
              continue
            fi
            BEFORE=$(awk "BEGIN{printf \"%.2f\", $SIZE/1048576}")
            magick "$f" -resize '1600x1600>' "$f"
            AFTER=$(awk "BEGIN{printf \"%.2f\", $(stat -c%s "$f")/1048576}")
            echo "tidied: $f (${BEFORE} MB -> ${AFTER} MB)"
            CHANGED=1
          done < <(find WHITE_PAGES -type f \( -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.webp' \))
          if [ "$CHANGED" -eq 0 ]; then echo "image-tidy: nothing over the line"; fi

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- WHITE_PAGES/; then
            echo "image-tidy: no change"
            exit 0
          fi
          git add WHITE_PAGES/
          git commit -m "town-clock: image tidy — declared size courtesy (dimension-only, names/formats untouched)"
          if ! git push; then
            git pull --rebase
            git push
          fi

  atlas:
    name: atlas
    needs: image-tidy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "town-clock[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build atlas
        run: |
          node PROJECTS/build-the-town/atlas/town-atlas.mjs
          if [ -f PROJECTS/build-the-town/atlas/render-town.mjs ]; then
            node PROJECTS/build-the-town/atlas/render-town.mjs
          fi

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- PROJECTS/build-the-town/atlas/; then
            echo "atlas: no change"
            exit 0
          fi
          git add PROJECTS/build-the-town/atlas/
          git commit -m "town-clock: atlas refresh"
          if ! git push; then
            git pull --rebase
            git push
          fi
